<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheMoneyShot — Starting…</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 480px;
            height: 320px;
            background: linear-gradient(135deg, #020617 0%, #0a1628 60%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            border-radius: 16px;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #fff;
            position: relative;
        }

        /* Subtle glow orb */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .logo-ring {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, #14b8a6, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 32px rgba(20, 184, 166, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        .logo-ring svg {
            width: 36px;
            height: 36px;
            color: #fff;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 32px rgba(20, 184, 166, 0.4);
            }

            50% {
                box-shadow: 0 0 48px rgba(20, 184, 166, 0.7);
            }
        }

        .wordmark {
            text-align: center;
        }

        .wordmark h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #14b8a6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .wordmark p {
            font-size: 11px;
            color: #4b5563;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .status {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 260px;
        }

        .progress-track {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #14b8a6, #06b6d4);
            border-radius: 99px;
            animation: slide 1.6s ease-in-out infinite;
        }

        @keyframes slide {
            0% {
                width: 0%;
                margin-left: 0;
            }

            50% {
                width: 70%;
                margin-left: 15%;
            }

            100% {
                width: 0%;
                margin-left: 100%;
            }
        }

        .status-text {
            font-size: 11px;
            color: #6b7280;
            letter-spacing: 0.5px;
            animation: blink 1.6s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .version {
            position: absolute;
            bottom: 16px;
            right: 20px;
            font-size: 10px;
            color: #374151;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <div class="logo-ring">
        <!-- Cash register icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path
                d="M3 7h18M3 7a2 2 0 00-2 2v8a2 2 0 002 2h18a2 2 0 002-2V9a2 2 0 00-2-2M3 7V5a2 2 0 012-2h6l2 2h6a2 2 0 012 2v2" />
            <circle cx="12" cy="13" r="2" />
        </svg>
    </div>

    <div class="wordmark">
        <h1>TheMoneyShot</h1>
        <p>Point of Sale System</p>
    </div>

    <div class="status">
        <div class="progress-track">
            <div class="progress-bar"></div>
        </div>
        <span class="status-text">Starting server…</span>
    </div>

    <div class="version">Beta 1.0 — Bottoms Up</div>
</body>

</html>
