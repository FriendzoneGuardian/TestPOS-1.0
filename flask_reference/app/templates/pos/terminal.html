{% extends "base.html" %}
{% block title %}POS Terminal · TheMoneyShot{% endblock %}

{% block content %}
<div class="flex flex-col lg:flex-row gap-4 h-[calc(100vh-7rem)]">

    <!-- Product Grid -->
    <div class="flex-1 flex flex-col min-h-0">
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-xl font-bold text-white">POS Terminal</h1>
            <input type="text" id="product-search" placeholder="Search products..."
                class="w-64 px-3 py-2 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 text-sm placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
        </div>
        <div id="product-grid"
            class="flex-1 overflow-y-auto grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 content-start">
            {% for product in products %}
            <button onclick="addToCart({{ product.id }}, '{{ product.name }}', {{ product.price }})"
                class="product-card glass-card rounded-xl p-4 text-left hover:border-indigo-500/40 transition-all group"
                data-name="{{ product.name|lower }}">
                <div
                    class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500/20 to-purple-500/20 flex items-center justify-center mb-3 group-hover:from-indigo-500/30 group-hover:to-purple-500/30 transition-all">
                    <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                </div>
                <p class="text-sm font-medium text-gray-200 truncate">{{ product.name }}</p>
                <p class="text-xs text-gray-400 mt-0.5">{{ product.category or 'General' }}</p>
                <p class="text-sm font-bold text-indigo-400 mt-2">${{ "%.2f"|format(product.price) }}</p>
            </button>
            {% endfor %}
        </div>
    </div>

    <!-- Cart Panel -->
    <div class="w-full lg:w-96 glass-card rounded-xl p-5 flex flex-col min-h-0">
        <h2 class="text-sm font-semibold text-gray-300 mb-4 flex items-center">
            <svg class="w-4 h-4 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z">
                </path>
            </svg>
            Current Cart
        </h2>

        <div id="cart-items" class="flex-1 overflow-y-auto space-y-2 mb-4">
            <p id="cart-empty" class="text-sm text-gray-500 text-center py-8">Cart is empty</p>
        </div>

        <!-- Cart Total -->
        <div class="border-t border-gray-700 pt-4 space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-400">Total</span>
                <span id="cart-total" class="text-xl font-bold text-white">$0.00</span>
            </div>

            <!-- Payment Method -->
            <div class="flex gap-2">
                <button onclick="setPayment('cash')" id="pay-cash"
                    class="flex-1 py-2 rounded-lg text-xs font-semibold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 transition-all">
                    💵 Cash
                </button>
                <button onclick="setPayment('loan')" id="pay-loan"
                    class="flex-1 py-2 rounded-lg text-xs font-semibold bg-surface-800 text-gray-400 border border-gray-700 transition-all">
                    📋 Loan
                </button>
            </div>

            <!-- Customer select (for Loans) -->
            <div id="customer-select-wrap" class="hidden">
                <select id="customer-select"
                    class="w-full px-3 py-2 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 text-sm">
                    <option value="">Select Customer...</option>
                    {% for c in customers %}
                    <option value="{{ c.id }}">{{ c.name }} (Balance: ${{ "%.2f"|format(c.outstanding_balance) }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <button onclick="checkout()" id="checkout-btn"
                class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold text-sm transition-all shadow-lg shadow-indigo-500/25 disabled:opacity-50 disabled:cursor-not-allowed"
                disabled>
                Complete Sale
            </button>
        </div>
    </div>
</div>

<!-- Void Modal -->
<div id="void-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="glass-card rounded-2xl p-6 w-full max-w-sm">
        <h3 class="text-lg font-bold text-white mb-4">Void Item</h3>
        <input type="hidden" id="void-item-id">
        <textarea id="void-reason" rows="3" placeholder="Reason for voiding..."
            class="w-full px-3 py-2 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 text-sm placeholder-gray-500 focus:ring-2 focus:ring-red-500 mb-4"></textarea>
        <div class="flex gap-2">
            <button onclick="closeVoidModal()"
                class="flex-1 py-2 rounded-lg bg-gray-700 text-gray-300 text-sm hover:bg-gray-600">Cancel</button>
            <button onclick="confirmVoid()"
                class="flex-1 py-2 rounded-lg bg-red-600 text-white text-sm hover:bg-red-500">Void Item</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    let cart = [];
    let paymentMethod = 'cash';

    // Product search filter
    document.getElementById('product-search').addEventListener('input', function () {
        const q = this.value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
            card.style.display = card.dataset.name.includes(q) ? '' : 'none';
        });
    });

    function addToCart(id, name, price) {
        const existing = cart.find(i => i.product_id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ product_id: id, name, price, quantity: 1 });
        }
        renderCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function updateQty(index, delta) {
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) cart.splice(index, 1);
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        const empty = document.getElementById('cart-empty');
        const btn = document.getElementById('checkout-btn');

        if (cart.length === 0) {
            container.innerHTML = '<p id="cart-empty" class="text-sm text-gray-500 text-center py-8">Cart is empty</p>';
            document.getElementById('cart-total').textContent = '$0.00';
            btn.disabled = true;
            return;
        }

        btn.disabled = false;
        let total = 0;
        let html = '';
        cart.forEach((item, i) => {
            const sub = item.price * item.quantity;
            total += sub;
            html += `
                <div class="flex items-center justify-between bg-surface-800/50 rounded-lg p-3">
                    <div class="flex-1 min-w-0 mr-3">
                        <p class="text-sm font-medium text-gray-200 truncate">${item.name}</p>
                        <p class="text-xs text-gray-400">$${item.price.toFixed(2)} × ${item.quantity}</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="updateQty(${i}, -1)" class="w-6 h-6 rounded bg-gray-700 text-gray-300 text-xs hover:bg-gray-600">−</button>
                        <span class="text-sm font-mono w-6 text-center text-white">${item.quantity}</span>
                        <button onclick="updateQty(${i}, 1)" class="w-6 h-6 rounded bg-gray-700 text-gray-300 text-xs hover:bg-gray-600">+</button>
                        <button onclick="removeFromCart(${i})" class="ml-1 w-6 h-6 rounded bg-red-500/20 text-red-400 text-xs hover:bg-red-500/30">✕</button>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
        document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
    }

    function setPayment(method) {
        paymentMethod = method;
        const cashBtn = document.getElementById('pay-cash');
        const loanBtn = document.getElementById('pay-loan');
        const custWrap = document.getElementById('customer-select-wrap');

        if (method === 'cash') {
            cashBtn.className = 'flex-1 py-2 rounded-lg text-xs font-semibold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 transition-all';
            loanBtn.className = 'flex-1 py-2 rounded-lg text-xs font-semibold bg-surface-800 text-gray-400 border border-gray-700 transition-all';
            custWrap.classList.add('hidden');
        } else {
            loanBtn.className = 'flex-1 py-2 rounded-lg text-xs font-semibold bg-amber-500/20 text-amber-400 border border-amber-500/30 transition-all';
            cashBtn.className = 'flex-1 py-2 rounded-lg text-xs font-semibold bg-surface-800 text-gray-400 border border-gray-700 transition-all';
            custWrap.classList.remove('hidden');
        }
    }

    function checkout() {
        if (cart.length === 0) return;
        const customerId = document.getElementById('customer-select').value;

        fetch('{{ url_for("pos.checkout") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}' },
            body: JSON.stringify({ items: cart, payment_method: paymentMethod, customer_id: customerId })
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    cart = [];
                    renderCart();
                    alert(`✅ Order #${data.order_id} completed! Total: $${data.total.toFixed(2)}`);
                } else {
                    alert('❌ ' + data.message);
                }
            })
            .catch(() => alert('Network error.'));
    }

    // Void functions
    function openVoidModal(itemId) {
        document.getElementById('void-item-id').value = itemId;
        document.getElementById('void-modal').classList.remove('hidden');
    }
    function closeVoidModal() {
        document.getElementById('void-modal').classList.add('hidden');
    }
    function confirmVoid() {
        const itemId = document.getElementById('void-item-id').value;
        const reason = document.getElementById('void-reason').value;
        fetch('{{ url_for("pos.void_item") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}' },
            body: JSON.stringify({ item_id: itemId, reason })
        })
            .then(r => r.json())
            .then(data => {
                closeVoidModal();
                if (data.success) alert('Item voided.');
                else alert(data.message);
            });
    }
</script>
{% endblock %}
