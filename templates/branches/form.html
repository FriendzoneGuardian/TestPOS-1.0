{% extends "base.html" %}
{% block title %}{% if branch %}Edit{% else %}New{% endif %} Branch · TheMoneyShot{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="{% url 'inventory:branch_list' %}" class="p-2 rounded-lg bg-surface-800 text-gray-400 hover:text-white transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-white">{% if branch %}Edit Branch: {{ branch.name }}{% else %}Create New Branch{% endif %}</h1>
    </div>

    <div class="glass-card rounded-2xl p-8">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="name" class="block text-sm font-medium text-gray-300 mb-2">Branch Name</label>
                <input type="text" id="name" name="name" required value="{{ branch.name|default:'' }}"
                    class="w-full px-4 py-2.5 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
            </div>
            <div>
                <label for="location" class="block text-sm font-medium text-gray-300 mb-2">Location</label>
                <input type="text" id="location" name="location" value="{{ branch.location|default:'' }}"
                    class="w-full px-4 py-2.5 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
            </div>
            {% if branch %}
            <div class="flex items-center gap-3">
                <input type="checkbox" id="is_active" name="is_active" {% if branch.is_active %}checked{% endif %}
                    class="w-5 h-5 rounded bg-surface-800 border-gray-700 text-primary-600 focus:ring-primary-500 focus:ring-offset-surface-900 border-2">
                <label for="is_active" class="text-sm font-medium text-gray-300">Active Branch</label>
            </div>
            {% endif %}

            <div class="pt-4">
                <button type="submit"
                    class="w-full py-3 rounded-xl bg-gradient-to-r from-primary-600 to-purple-600 hover:from-primary-500 hover:to-purple-500 text-white font-semibold shadow-lg shadow-primary-500/25 transition-all">
                    {% if branch %}Update Branch{% else %}Create Branch{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
