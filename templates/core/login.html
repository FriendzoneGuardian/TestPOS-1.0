{% extends "base.html" %}
{% load static %}

{% block title %}Login · DjangoShot{% endblock %}

{% block content_unauth %}
<div class="min-h-screen flex items-center justify-center px-4 bg-surface-900">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 mb-4 shadow-lg shadow-indigo-500/25">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold gradient-text">DjangoShot</h1>
            <p class="text-gray-400 mt-1 text-sm">Sign in to your account</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl p-8">
            
            {% if form.errors %}
            <div class="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-sm text-red-500">
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="POST" action="{% url 'core:login' %}" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
                    <input type="text" id="id_username" name="username" required autofocus
                        class="w-full px-4 py-2.5 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-sm"
                        placeholder="Enter your username">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                    <input type="password" id="id_password" name="password" required
                        class="w-full px-4 py-2.5 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-sm"
                        placeholder="Enter your password">
                </div>
                <button type="submit" id="login-btn"
                    class="w-full py-2.5 px-4 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold text-sm transition-all shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-500 mt-6">Default: admin / admin123</p>
    </div>
</div>
{% endblock %}
