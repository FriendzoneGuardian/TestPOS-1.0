{% extends "base.html" %}
{% block title %}Reports · TheMoneyShot{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-white mb-6">Reports</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <a href="{{ url_for('reports.sales') }}" class="glass-card rounded-xl p-6 stat-card group">
        <div
            class="w-12 h-12 rounded-xl bg-emerald-500/15 flex items-center justify-center mb-4 group-hover:bg-emerald-500/25">
            <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                </path>
            </svg>
        </div>
        <h3 class="text-lg font-semibold text-white">Sales Report</h3>
        <p class="text-sm text-gray-400 mt-1">Daily, weekly, monthly sales by branch</p>
    </a>

    <a href="{{ url_for('reports.voids') }}" class="glass-card rounded-xl p-6 stat-card group">
        <div class="w-12 h-12 rounded-xl bg-red-500/15 flex items-center justify-center mb-4 group-hover:bg-red-500/25">
            <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636">
                </path>
            </svg>
        </div>
        <h3 class="text-lg font-semibold text-white">Void Report</h3>
        <p class="text-sm text-gray-400 mt-1">Audit log of voided transactions</p>
    </a>

    <a href="{{ url_for('reports.export_csv') }}" class="glass-card rounded-xl p-6 stat-card group">
        <div
            class="w-12 h-12 rounded-xl bg-blue-500/15 flex items-center justify-center mb-4 group-hover:bg-blue-500/25">
            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                </path>
            </svg>
        </div>
        <h3 class="text-lg font-semibold text-white">Export CSV</h3>
        <p class="text-sm text-gray-400 mt-1">Download sales data as spreadsheet</p>
    </a>
</div>
{% endblock %}
