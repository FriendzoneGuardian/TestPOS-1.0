{% extends "base.html" %}
{% block title %}Login · TheMoneyShot{% endblock %}

{% block content_unauth %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-500 to-accent-600 mb-4 shadow-lg shadow-primary-500/25">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold gradient-text">TheMoneyShot</h1>
            <p class="text-gray-400 mt-1 text-sm">Sign in to your account</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl p-8">
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                        class="w-full px-4 py-2.5 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all text-sm"
                        placeholder="Enter your username">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2.5 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all text-sm"
                        placeholder="Enter your password">
                </div>
                <button type="submit" id="login-btn"
                    class="w-full py-2.5 px-4 rounded-xl bg-gradient-to-r from-primary-600 to-accent-600 hover:from-primary-500 hover:to-accent-500 text-white font-semibold text-sm transition-all shadow-lg shadow-primary-500/25 hover:shadow-primary-500/40">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-500 mt-6">Default: admin / admin123</p>
    </div>
</div>
{% endblock %}
