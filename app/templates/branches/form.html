{% extends "base.html" %}
{% block title %}{{ 'Edit' if branch else 'New' }} Branch · TheMoneyShot{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-white mb-6">{{ 'Edit Branch' if branch else 'Create New Branch' }}</h1>

    <div class="glass-card rounded-xl p-6">
        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Branch Name</label>
                <input type="text" name="name" value="{{ branch.name if branch else '' }}" required
                    class="w-full px-4 py-2.5 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Location</label>
                <input type="text" name="location" value="{{ branch.location if branch else '' }}"
                    class="w-full px-4 py-2.5 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="e.g. 123 Main St">
            </div>
            {% if branch %}
            <div class="flex items-center gap-2">
                <input type="checkbox" name="is_active" id="is_active" {{ 'checked' if branch.is_active }}
                    class="w-4 h-4 rounded bg-surface-800 border-gray-600 text-indigo-600 focus:ring-indigo-500">
                <label for="is_active" class="text-sm text-gray-300">Active</label>
            </div>
            {% endif %}
            <div class="flex gap-2 pt-2">
                <a href="{{ url_for('branches.index') }}"
                    class="flex-1 text-center py-2.5 rounded-xl bg-gray-700 text-gray-300 text-sm hover:bg-gray-600">Cancel</a>
                <button type="submit"
                    class="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white text-sm font-semibold hover:from-indigo-500 hover:to-purple-500">
                    {{ 'Update' if branch else 'Create' }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
