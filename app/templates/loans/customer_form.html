{% extends "base.html" %}
{% block title %}Add Customer · TheMoneyShot{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-white mb-6">Add Customer</h1>

    <div class="glass-card rounded-xl p-6">
        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Customer Name</label>
                <input type="text" name="name" required
                    class="w-full px-4 py-2.5 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="Full name">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Contact Info</label>
                <input type="text" name="contact"
                    class="w-full px-4 py-2.5 rounded-xl bg-surface-800 border border-gray-700 text-gray-200 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="Phone or email">
            </div>
            <div class="flex gap-2 pt-2">
                <a href="{{ url_for('loans.index') }}"
                    class="flex-1 text-center py-2.5 rounded-xl bg-gray-700 text-gray-300 text-sm hover:bg-gray-600">Cancel</a>
                <button type="submit"
                    class="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white text-sm font-semibold hover:from-indigo-500 hover:to-purple-500">
                    Add Customer
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
